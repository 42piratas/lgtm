# Site config template. Copy to sites/<name>.yaml and edit — real configs are
# git-ignored, so yours never get committed. `lgtm run <name>` picks it up.

# Slug — must match the filename and the `run <name>` argument.
name: example

# Optional display name for the report.
label: Example Site

# Required. Probed by the black-box runners. Local-first: point at your dev
# server, then re-point at prod with `--url https://example.com`.
baseUrl: http://localhost:3000

# Path to the repo checkout (absolute, or ~/-relative). Unlocks the white-box
# scanners: deps / secrets / sast.
#
# Omit it and those three cannot run — which means your dependencies, your git
# history and your source code go unaudited, and the run FAILS. That is not a
# technicality: a green build that never scanned any of them is worth nothing.
# If you really don't want them here, waive them explicitly under `skip:` below.
# repoPath: ~/code/example-app

# Extra routes (paths or absolute URLs) to cover for a11y / perf / access-control.
routes:
  - /
  - /pricing
  - /login

# Authentication:
#   { type: none }                          public pages only
#   { type: storageState, path: .auth/x }   authed — capture via `lgtm auth <name>`
auth:
  type: none
  # type: storageState
  # path: .auth/example.json

# Fail the run (exit 1) if any finding is at or above this severity.
# One of: critical | high | medium | low
failOn: high

# Runners you explicitly waive for this site. A waiver is a decision on the
# record: the report says the domain was not audited, and the run can still
# pass. Anything that fails to run WITHOUT a waiver is a coverage hole and fails
# the run instead.
# skip:
#   - zap
