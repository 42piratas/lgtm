<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>webkit-text-stroke with GENUINELY BAD fill contrast (42L-973 review)</title>
<style>
  body { background: #ffffff; font-family: sans-serif; padding: 40px; }
  /*
   * The false-NEGATIVE guard for the -webkit-text-stroke downgrade.
   *
   * axe flags this node (it samples the light #EEEEEE stroke against white).
   * But the node's ACTUAL text fill is #DDDDDD on #FFFFFF — about 1.3:1 —
   * which genuinely fails WCAG AA on its own merits. The stroke is not the
   * reason it fails.
   *
   * A naive "any stroked node -> needs review" rule would quietly downgrade
   * this to non-blocking and stop failing the build on real, inaccessible
   * text. It must remain a HARD failure.
   */
  .bad-fill {
    color: #DDDDDD;
    -webkit-text-stroke: 2px #EEEEEE;
    font-size: 16px;
  }
</style>
</head>
<body>
  <p class="bad-fill">Fill is ~1.3:1 — genuinely inaccessible. Must still FAIL hard.</p>
</body>
</html>
