version: 2
updates:
  # Keeps the SHA-pinned actions in .github/workflows/*.yml current — a pin
  # only stays safe if something is watching for the tag it names to move.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
