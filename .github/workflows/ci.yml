name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0 — pinned to a commit SHA (not a tag) so the
      # action can't be silently repointed; dependabot keeps this current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (hermetic — no network, no Docker, no browser)
        run: npm test

  integration:
    # Does the scanner actually find the thing?
    #
    # The hermetic suite mocks Docker, so every scanner's output is a fixture —
    # which makes it structurally blind to the flags we send the real tool. It
    # was blind to exactly that: `secrets` asked gitleaks for its report on
    # `--report-path /dev/stdout`, which gitleaks accepts and ignores, so the
    # runner had never reported a single leaked credential on any repository,
    # ever, while every unit test stayed green.
    #
    # A mock cannot catch a lie told to the mock. This job plants a real secret
    # in a real repo and runs the real image. It is slow. It is not optional.
    name: integration (real scanner images)
    runs-on: ubuntu-latest # ships with Docker
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test against the real gitleaks / osv-scanner / semgrep images
        run: npm run test:integration
