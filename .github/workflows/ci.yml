name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.0 — pinned to a commit SHA (not a tag) so the
      # action can't be silently repointed; dependabot keeps this current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (hermetic — no network, no Docker, no browser)
        run: npm test
